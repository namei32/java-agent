server:
  address: 127.0.0.1
  forward-headers-strategy: none
  shutdown: graceful
spring:
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  ai:
    model:
      embedding: none
    openai:
      base-url: ${OPENAI_BASE_URL:}
      api-key: ${OPENAI_API_KEY:}
      embedding:
        model: ${agent.memory.embedding.model}
        dimensions: ${agent.memory.embedding.dimensions}
      chat:
        model: ${OPENAI_MODEL:}
        temperature: 0.7
        timeout: ${AGENT_MODEL_TIMEOUT:60s}
agent:
  workspace: ${AKASHIC_WORKSPACE:./workspace}
  prompt:
    mode: ${AGENT_PROMPT_MODE:MINIMAL}
    zone-id: ${AGENT_PROMPT_ZONE_ID:UTC}
    max-system-tokens: ${AGENT_PROMPT_MAX_SYSTEM_TOKENS:100000}
    max-frame-tokens: ${AGENT_PROMPT_MAX_FRAME_TOKENS:100000}
    max-total-tokens: ${AGENT_PROMPT_MAX_TOTAL_TOKENS:200000}
    max-sections: ${AGENT_PROMPT_MAX_SECTIONS:9}
  skills:
    mode: ${AGENT_SKILLS_MODE:DISABLED}
    builtin-root: ${AGENT_SKILLS_BUILTIN_ROOT:}
    max-skills: ${AGENT_SKILLS_MAX_SKILLS:64}
    max-file-bytes: ${AGENT_SKILLS_MAX_FILE_BYTES:65536}
    max-catalog-code-points: ${AGENT_SKILLS_MAX_CATALOG_CODE_POINTS:32768}
    max-active-code-points: ${AGENT_SKILLS_MAX_ACTIVE_CODE_POINTS:32768}
    max-read-code-points: ${AGENT_SKILLS_MAX_READ_CODE_POINTS:20000}
  conversation-evidence:
    mode: ${AGENT_CONVERSATION_EVIDENCE_MODE:DISABLED}
  workspace-tools:
    mode: ${AGENT_WORKSPACE_TOOLS_MODE:DISABLED}
    root: ${AGENT_WORKSPACE_TOOLS_ROOT:}
    max-source-bytes: ${AGENT_WORKSPACE_TOOLS_MAX_SOURCE_BYTES:1000000}
    max-lines: ${AGENT_WORKSPACE_TOOLS_MAX_LINES:400}
    max-output-bytes: ${AGENT_WORKSPACE_TOOLS_MAX_OUTPUT_BYTES:10000}
    max-output-code-points: ${AGENT_WORKSPACE_TOOLS_MAX_OUTPUT_CODE_POINTS:20000}
    max-directory-entries: ${AGENT_WORKSPACE_TOOLS_MAX_DIRECTORY_ENTRIES:256}
  history:
    max-messages: 40
    max-characters: 100000
  model:
    timeout: ${AGENT_MODEL_TIMEOUT:60s}
    stream-idle-timeout: ${AGENT_MODEL_STREAM_IDLE_TIMEOUT:30s}
    max-delta-events: ${AGENT_MODEL_MAX_DELTA_EVENTS:2048}
    max-delta-code-points: ${AGENT_MODEL_MAX_DELTA_CODE_POINTS:32000}
    provider-options:
      profile: ${AGENT_MODEL_PROVIDER_OPTIONS_PROFILE:DISABLED}
      thinking-mode: ${AGENT_MODEL_PROVIDER_OPTIONS_THINKING_MODE:DISABLED}
      reasoning-effort: ${AGENT_MODEL_PROVIDER_OPTIONS_REASONING_EFFORT:NONE}
    reasoning-continuation:
      mode: ${AGENT_MODEL_REASONING_CONTINUATION_MODE:DISABLED}
  context-limit-recovery:
    mode: ${AGENT_CONTEXT_LIMIT_RECOVERY_MODE:DISABLED}
  cli:
    session-id: ${AGENT_CLI_SESSION_ID:cli:local}
    conversation-id: ${AGENT_CLI_CONVERSATION_ID:local}
    buffer-capacity: ${AGENT_CLI_BUFFER_CAPACITY:32}
    publish-timeout: ${AGENT_CLI_PUBLISH_TIMEOUT:2s}
    poll-timeout: ${AGENT_CLI_POLL_TIMEOUT:100ms}
  control-plane:
    mode: ${AGENT_CONTROL_PLANE_MODE:DISABLED}
    session-ttl: ${AGENT_CONTROL_PLANE_SESSION_TTL:15m}
    max-sessions: ${AGENT_CONTROL_PLANE_MAX_SESSIONS:4}
    max-active-turns: ${AGENT_CONTROL_PLANE_MAX_ACTIVE_TURNS:128}
    terminal-retention: ${AGENT_CONTROL_PLANE_TERMINAL_RETENTION:5m}
    max-terminal-tombstones: ${AGENT_CONTROL_PLANE_MAX_TERMINAL_TOMBSTONES:1024}
    max-subscribers: ${AGENT_CONTROL_PLANE_MAX_SUBSCRIBERS:8}
    subscriber-buffer-capacity: ${AGENT_CONTROL_PLANE_SUBSCRIBER_BUFFER_CAPACITY:64}
    heartbeat-interval: ${AGENT_CONTROL_PLANE_HEARTBEAT_INTERVAL:15s}
    stream-max-lifetime: ${AGENT_CONTROL_PLANE_STREAM_MAX_LIFETIME:15m}
    shutdown-timeout: ${AGENT_CONTROL_PLANE_SHUTDOWN_TIMEOUT:2s}
  approval-inbox:
    mode: ${AGENT_APPROVAL_INBOX_MODE:DISABLED}
  channels:
    reliability:
      mode: ${AGENT_CHANNEL_RELIABILITY_MODE:DISABLED}
      recovery-batch-size: ${AGENT_CHANNEL_RELIABILITY_RECOVERY_BATCH_SIZE:100}
      cleanup-batch-size: ${AGENT_CHANNEL_RELIABILITY_CLEANUP_BATCH_SIZE:100}
      retention: ${AGENT_CHANNEL_RELIABILITY_RETENTION:30d}
      max-inbox-records: ${AGENT_CHANNEL_RELIABILITY_MAX_INBOX_RECORDS:100000}
      max-delivery-records: ${AGENT_CHANNEL_RELIABILITY_MAX_DELIVERY_RECORDS:10000}
    telegram:
      enabled: ${AGENT_TELEGRAM_ENABLED:false}
      allow-from: ${AGENT_TELEGRAM_ALLOW_FROM:}
      max-concurrent-turns: ${AGENT_TELEGRAM_MAX_CONCURRENT_TURNS:8}
      buffer-capacity: ${AGENT_TELEGRAM_BUFFER_CAPACITY:32}
      publish-timeout: ${AGENT_TELEGRAM_PUBLISH_TIMEOUT:2s}
      poll-timeout: ${AGENT_TELEGRAM_POLL_TIMEOUT:100ms}
      connect-timeout: ${AGENT_TELEGRAM_CONNECT_TIMEOUT:5s}
      long-poll-timeout: ${AGENT_TELEGRAM_LONG_POLL_TIMEOUT:20s}
      poll-request-timeout: ${AGENT_TELEGRAM_POLL_REQUEST_TIMEOUT:25s}
      send-request-timeout: ${AGENT_TELEGRAM_SEND_REQUEST_TIMEOUT:5s}
      shutdown-timeout: ${AGENT_TELEGRAM_SHUTDOWN_TIMEOUT:5s}
      retry-backoff: ${AGENT_TELEGRAM_RETRY_BACKOFF:250ms}
      max-retry-after: ${AGENT_TELEGRAM_MAX_RETRY_AFTER:5s}
  mcp:
    mode: ${AGENT_MCP_MODE:DISABLED}
    config-file: ${AGENT_MCP_CONFIG_FILE:}
    max-servers: ${AGENT_MCP_MAX_SERVERS:4}
    max-tools-per-server: ${AGENT_MCP_MAX_TOOLS_PER_SERVER:32}
    max-list-pages: ${AGENT_MCP_MAX_LIST_PAGES:8}
    connect-timeout: ${AGENT_MCP_CONNECT_TIMEOUT:5s}
    request-timeout: ${AGENT_MCP_REQUEST_TIMEOUT:4s}
    shutdown-timeout: ${AGENT_MCP_SHUTDOWN_TIMEOUT:2s}
    max-schema-bytes: ${AGENT_MCP_MAX_SCHEMA_BYTES:65536}
    max-wire-bytes: ${AGENT_MCP_MAX_WIRE_BYTES:1048576}
    max-concurrent-calls-per-server: ${AGENT_MCP_MAX_CONCURRENT_CALLS_PER_SERVER:1}
    assets:
      mode: ${AGENT_MCP_ASSETS_MODE:DISABLED}
  plugins:
    mode: ${AGENT_PLUGINS_MODE:DISABLED}
    tap-timeout: ${AGENT_PLUGINS_TAP_TIMEOUT:500ms}
    shutdown-timeout: ${AGENT_PLUGINS_SHUTDOWN_TIMEOUT:1s}
    max-frame-bytes: ${AGENT_PLUGINS_MAX_FRAME_BYTES:65536}
    java-service-ids: []
    external: []
  proactive:
    mode: ${AGENT_PROACTIVE_MODE:DISABLED}
    owner-id: ${AGENT_PROACTIVE_OWNER_ID:proactive-local}
    lease-duration: ${AGENT_PROACTIVE_LEASE_DURATION:30s}
    idle-wait: ${AGENT_PROACTIVE_IDLE_WAIT:5s}
    shutdown-timeout: ${AGENT_PROACTIVE_SHUTDOWN_TIMEOUT:2s}
    cooldown: ${AGENT_PROACTIVE_COOLDOWN:5m}
    plans: []
  proactive-inspection:
    mode: ${AGENT_PROACTIVE_INSPECTION_MODE:DISABLED}
  memory:
    mode: ${AGENT_MEMORY_MODE:DISABLED}
    max-file-bytes: ${AGENT_MEMORY_MAX_FILE_BYTES:65536}
    max-context-characters: ${AGENT_MEMORY_MAX_CONTEXT_CHARACTERS:100000}
    max-retrieved-characters: ${AGENT_MEMORY_MAX_RETRIEVED_CHARACTERS:20000}
    embedding:
      model: ${AGENT_MEMORY_EMBEDDING_MODEL:text-embedding-v3}
      dimensions: ${AGENT_MEMORY_EMBEDDING_DIMENSIONS:1024}
      max-text-code-points: ${AGENT_MEMORY_EMBEDDING_MAX_TEXT_CODE_POINTS:2000}
    retrieval:
      top-k: ${AGENT_MEMORY_RETRIEVAL_TOP_K:8}
      score-threshold: ${AGENT_MEMORY_RETRIEVAL_SCORE_THRESHOLD:0.45}
      hotness-alpha: ${AGENT_MEMORY_RETRIEVAL_HOTNESS_ALPHA:0.20}
      hotness-half-life-days: ${AGENT_MEMORY_RETRIEVAL_HOTNESS_HALF_LIFE_DAYS:14}
      max-candidates: ${AGENT_MEMORY_RETRIEVAL_MAX_CANDIDATES:10000}
      max-injected-characters: ${AGENT_MEMORY_RETRIEVAL_MAX_INJECTED_CHARACTERS:6000}
  memory-recall:
    mode: ${AGENT_MEMORY_RECALL_MODE:DISABLED}
  capabilities:
    memory-forget:
      mode: ${AGENT_MEMORY_FORGET_MODE:DISABLED}
      capsule-key-id: ${AGENT_MEMORY_FORGET_CAPSULE_KEY_ID:}
      capsule-key-base64: ${AGENT_MEMORY_FORGET_CAPSULE_KEY_BASE64:}
  tool-loop:
    max-iterations: ${AGENT_TOOL_MAX_ITERATIONS:6}
  tools:
    mode: ${AGENT_TOOL_MODE:READ_ONLY}
    max-calls-per-response: ${AGENT_TOOL_MAX_CALLS_PER_RESPONSE:8}
    max-calls-per-turn: ${AGENT_TOOL_MAX_CALLS_PER_TURN:16}
    timeout: ${AGENT_TOOL_TIMEOUT:5s}
    max-concurrent-calls: ${AGENT_TOOL_MAX_CONCURRENT_CALLS:32}
    max-argument-bytes: ${AGENT_TOOL_MAX_ARGUMENT_BYTES:16384}
    max-result-characters: ${AGENT_TOOL_MAX_RESULT_CHARACTERS:20000}
    approval-timeout: ${AGENT_TOOL_APPROVAL_TIMEOUT:5m}
logging:
  level:
    io.modelcontextprotocol: "OFF"
management:
  endpoints:
    web:
      exposure:
        include: health
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never

server:
  address: 127.0.0.1
  shutdown: graceful
spring:
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  ai:
    model:
      embedding: none
    openai:
      base-url: ${OPENAI_BASE_URL:}
      api-key: ${OPENAI_API_KEY:}
      embedding:
        model: ${agent.memory.embedding.model}
        dimensions: ${agent.memory.embedding.dimensions}
      chat:
        model: ${OPENAI_MODEL:}
        temperature: 0.7
        timeout: ${AGENT_MODEL_TIMEOUT:60s}
agent:
  workspace: ${AKASHIC_WORKSPACE:./workspace}
  history:
    max-messages: 40
    max-characters: 100000
  model:
    timeout: ${AGENT_MODEL_TIMEOUT:60s}
  mcp:
    mode: ${AGENT_MCP_MODE:DISABLED}
    config-file: ${AGENT_MCP_CONFIG_FILE:}
    max-servers: ${AGENT_MCP_MAX_SERVERS:4}
    max-tools-per-server: ${AGENT_MCP_MAX_TOOLS_PER_SERVER:32}
    max-list-pages: ${AGENT_MCP_MAX_LIST_PAGES:8}
    connect-timeout: ${AGENT_MCP_CONNECT_TIMEOUT:5s}
    request-timeout: ${AGENT_MCP_REQUEST_TIMEOUT:4s}
    shutdown-timeout: ${AGENT_MCP_SHUTDOWN_TIMEOUT:2s}
    max-schema-bytes: ${AGENT_MCP_MAX_SCHEMA_BYTES:65536}
    max-wire-bytes: ${AGENT_MCP_MAX_WIRE_BYTES:1048576}
    max-concurrent-calls-per-server: ${AGENT_MCP_MAX_CONCURRENT_CALLS_PER_SERVER:1}
  memory:
    mode: ${AGENT_MEMORY_MODE:DISABLED}
    max-file-bytes: ${AGENT_MEMORY_MAX_FILE_BYTES:65536}
    max-context-characters: ${AGENT_MEMORY_MAX_CONTEXT_CHARACTERS:100000}
    max-retrieved-characters: ${AGENT_MEMORY_MAX_RETRIEVED_CHARACTERS:20000}
    embedding:
      model: ${AGENT_MEMORY_EMBEDDING_MODEL:text-embedding-v3}
      dimensions: ${AGENT_MEMORY_EMBEDDING_DIMENSIONS:1024}
      max-text-code-points: ${AGENT_MEMORY_EMBEDDING_MAX_TEXT_CODE_POINTS:2000}
    retrieval:
      top-k: ${AGENT_MEMORY_RETRIEVAL_TOP_K:8}
      score-threshold: ${AGENT_MEMORY_RETRIEVAL_SCORE_THRESHOLD:0.45}
      hotness-alpha: ${AGENT_MEMORY_RETRIEVAL_HOTNESS_ALPHA:0.20}
      hotness-half-life-days: ${AGENT_MEMORY_RETRIEVAL_HOTNESS_HALF_LIFE_DAYS:14}
      max-candidates: ${AGENT_MEMORY_RETRIEVAL_MAX_CANDIDATES:10000}
      max-injected-characters: ${AGENT_MEMORY_RETRIEVAL_MAX_INJECTED_CHARACTERS:6000}
  tool-loop:
    max-iterations: ${AGENT_TOOL_MAX_ITERATIONS:6}
  tools:
    mode: ${AGENT_TOOL_MODE:READ_ONLY}
    max-calls-per-response: ${AGENT_TOOL_MAX_CALLS_PER_RESPONSE:8}
    max-calls-per-turn: ${AGENT_TOOL_MAX_CALLS_PER_TURN:16}
    timeout: ${AGENT_TOOL_TIMEOUT:5s}
    max-concurrent-calls: ${AGENT_TOOL_MAX_CONCURRENT_CALLS:32}
    max-argument-bytes: ${AGENT_TOOL_MAX_ARGUMENT_BYTES:16384}
    max-result-characters: ${AGENT_TOOL_MAX_RESULT_CHARACTERS:20000}
    approval-timeout: ${AGENT_TOOL_APPROVAL_TIMEOUT:5m}
logging:
  level:
    io.modelcontextprotocol: "OFF"
management:
  endpoints:
    web:
      exposure:
        include: health
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
